spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/chinvat}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:true}

chinvat.eidas.broker-base-url=${EIDAS_BROKER_BASE_URL:http://localhost:${SERVER_PORT:8080}}
chinvat.eidas.broker-providers-path=${EIDAS_BROKER_PROVIDERS_PATH:/api/v1/auth/eidas/mock-broker/providers}
chinvat.eidas.broker-login-path=${EIDAS_BROKER_LOGIN_PATH:/api/v1/auth/eidas/mock-broker/login}
chinvat.eidas.broker-callback-path=${EIDAS_BROKER_CALLBACK_PATH:/api/v1/auth/eidas/mock-broker/callback}
chinvat.eidas.broker-connect-timeout-millis=${EIDAS_BROKER_CONNECT_TIMEOUT_MS:5000}
chinvat.eidas.state-redis.dedicated=${EIDAS_STATE_REDIS_DEDICATED:true}
chinvat.eidas.state-redis.host=${EIDAS_STATE_REDIS_HOST:localhost}
chinvat.eidas.state-redis.port=${EIDAS_STATE_REDIS_PORT:6379}
chinvat.eidas.state-redis.database=${EIDAS_STATE_REDIS_DATABASE:0}
chinvat.eidas.state-redis.username=${EIDAS_STATE_REDIS_USERNAME:}
chinvat.eidas.state-redis.password=${EIDAS_STATE_REDIS_PASSWORD:}

