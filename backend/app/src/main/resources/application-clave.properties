# =============================================================================
# Cl@ve 2.0 OIDC — Spring profile: clave
# =============================================================================
#
# Activate alongside your base environment profile, e.g.:
#   SPRING_PROFILES_ACTIVE=staging,clave
#
# All sensitive values (client-id, client-secret, redirect-uri) MUST be
# supplied via environment variables — never committed to source control.
#
# Step 1 — obtain OIDC endpoint URLs from the Cl@ve discovery document:
#   curl https://<clave-host>/OpenIdProvider/OidcProvider/.well-known/openid-configuration
#
#   PRE environment host : clave-dninbsso-pre.redsara.es
#   PRO environment host : clave-dninbsso.redsara.es
#
# Step 2 — register your application as a Service Provider with FNMT/SEAD:
#   https://administracion.gob.es/pag_Home/atencionCiudadana/clave.html
#   You will receive client-id and client-secret after registration.
#
# Step 3 — set the environment variables listed below and start the backend
#           with: SPRING_PROFILES_ACTIVE=staging,clave
# =============================================================================

# Enable Cl@ve adapter (replaces generic HttpEidasBrokerAdapter)
chinvat.clave.enabled=true

# --- OIDC Endpoints -----------------------------------------------------------
# Copy these values from the discovery document (.well-known/openid-configuration)

chinvat.clave.issuer-uri=${CLAVE_ISSUER_URI}
chinvat.clave.authorization-endpoint=${CLAVE_AUTHORIZATION_ENDPOINT}
chinvat.clave.token-endpoint=${CLAVE_TOKEN_ENDPOINT}
chinvat.clave.jwks-uri=${CLAVE_JWKS_URI}

# --- Client Registration ------------------------------------------------------
# Provided by FNMT/SEAD after SP registration

chinvat.clave.client-id=${CLAVE_CLIENT_ID}
chinvat.clave.client-secret=${CLAVE_CLIENT_SECRET}

# --- OIDC Flow ----------------------------------------------------------------
# redirect-uri must exactly match the value registered with Cl@ve
# Example: https://your-app.example.com/auth/eidas/callback

chinvat.clave.redirect-uri=${CLAVE_REDIRECT_URI}
chinvat.clave.scope=openid profile
chinvat.clave.acr-values=http://eidas.europa.eu/LoA/high

# --- Timeouts -----------------------------------------------------------------

chinvat.clave.connect-timeout-millis=${CLAVE_CONNECT_TIMEOUT_MS:10000}
chinvat.clave.read-timeout-millis=${CLAVE_READ_TIMEOUT_MS:30000}

# --- Providers ----------------------------------------------------------------
# List the eIDAS countries you want to expose to your users.
# Cl@ve acts as a gateway to all EU eIDAS network members.
# code must match what the frontend sends as providerCode.

chinvat.clave.providers[0].code=CLAVE_ES
chinvat.clave.providers[0].display-name=Cl@ve \u2014 Espa\u00f1a (DNI / NIE)
chinvat.clave.providers[0].country-code=ES
chinvat.clave.providers[0].enabled=true

chinvat.clave.providers[1].code=CLAVE_DE
chinvat.clave.providers[1].display-name=Cl@ve \u2014 Deutschland
chinvat.clave.providers[1].country-code=DE
chinvat.clave.providers[1].enabled=true

chinvat.clave.providers[2].code=CLAVE_FR
chinvat.clave.providers[2].display-name=Cl@ve \u2014 France
chinvat.clave.providers[2].country-code=FR
chinvat.clave.providers[2].enabled=true

chinvat.clave.providers[3].code=CLAVE_IT
chinvat.clave.providers[3].display-name=Cl@ve \u2014 Italia
chinvat.clave.providers[3].country-code=IT
chinvat.clave.providers[3].enabled=true

chinvat.clave.providers[4].code=CLAVE_PT
chinvat.clave.providers[4].display-name=Cl@ve \u2014 Portugal
chinvat.clave.providers[4].country-code=PT
chinvat.clave.providers[4].enabled=true
