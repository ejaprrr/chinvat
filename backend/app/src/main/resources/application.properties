spring.application.name=chinvat

spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

server.port=${SERVER_PORT:8080}
spring.jackson.time-zone=${APP_TIME_ZONE:UTC}
management.endpoints.web.exposure.include=health,info,metrics

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.timeout=${REDIS_TIMEOUT:2s}

# eIDAS broker defaults (override in environment-specific profiles)
chinvat.eidas.broker-base-url=${EIDAS_BROKER_BASE_URL:https://eidas-broker.example.invalid}
chinvat.eidas.broker-providers-path=${EIDAS_BROKER_PROVIDERS_PATH:/api/v1/providers}
chinvat.eidas.broker-login-path=${EIDAS_BROKER_LOGIN_PATH:/api/v1/login}
chinvat.eidas.broker-callback-path=${EIDAS_BROKER_CALLBACK_PATH:/api/v1/callback}
chinvat.eidas.broker-connect-timeout-millis=${EIDAS_BROKER_CONNECT_TIMEOUT_MS:5000}
chinvat.eidas.state-ttl=${EIDAS_STATE_TTL:PT10M}
chinvat.eidas.state-key-prefix=${EIDAS_STATE_KEY_PREFIX:chinvat:eidas:state:}
# eIDAS state stored in redis-auth (dedicated auth service Redis)
chinvat.eidas.state-redis.dedicated=${EIDAS_STATE_REDIS_DEDICATED:false}
chinvat.eidas.state-redis.host=${EIDAS_STATE_REDIS_HOST:redis-auth}
chinvat.eidas.state-redis.port=${EIDAS_STATE_REDIS_PORT:6379}
chinvat.eidas.state-redis.database=${EIDAS_STATE_REDIS_DATABASE:1}
chinvat.eidas.state-redis.username=${EIDAS_STATE_REDIS_USERNAME:eidas-app}
chinvat.eidas.state-redis.password=${EIDAS_STATE_REDIS_PASSWORD:}

app.security.permission-cache.ttl=${PERMISSION_CACHE_TTL:PT15M}
app.security.permission-cache.key-prefix=${PERMISSION_CACHE_PREFIX:chinvat:permissions:}
app.security.fnmt.proxy-shared-secret=${FNMT_PROXY_SHARED_SECRET:dev-fnmt-proxy-secret}

# Request/Response caching stored in redis-auth (dedicated auth service Redis)
# Never use global redis for app cache - security risk
app.cache.redis.dedicated=${APP_CACHE_REDIS_DEDICATED:false}
app.cache.redis.host=${APP_CACHE_REDIS_HOST:redis-auth}
app.cache.redis.port=${APP_CACHE_REDIS_PORT:6379}
app.cache.redis.database=${APP_CACHE_REDIS_DATABASE:0}
app.cache.redis.username=${APP_CACHE_REDIS_USERNAME:eidas-app}
app.cache.redis.password=${APP_CACHE_REDIS_PASSWORD:}
app.cache.key-prefix=${APP_CACHE_KEY_PREFIX:chinvat:cache:}
app.cache.default-ttl=${APP_CACHE_DEFAULT_TTL:PT5M}
app.cache.users-by-id-ttl=${APP_CACHE_USERS_BY_ID_TTL:PT5M}
app.cache.users-all-ttl=${APP_CACHE_USERS_ALL_TTL:PT2M}
app.cache.trust-certificate-validation-ttl=${APP_CACHE_TRUST_CERT_VALIDATION_TTL:PT15M}
app.cache.trust-credentials-by-user-ttl=${APP_CACHE_TRUST_CREDENTIALS_BY_USER_TTL:PT2M}
app.cache.eidas-providers-ttl=${APP_CACHE_EIDAS_PROVIDERS_TTL:PT30M}

# CORS
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# Rate Limiting Configuration
app.rate-limiting.enabled=${RATE_LIMITING_ENABLED:true}
app.rate-limiting.cache-ttl=PT1M
# Rate limit counters stored in Redis (redis-global connection)
# Distributed across all application instances
# Per-user limits (authenticated):
#   - LOGIN: 10/5min
#   - PASSWORD_RESET: 3/hour
#   - CERTIFICATE_BIND: 5/hour
#   - EIDAS_LOGIN: 10/hour
#   - API_GENERAL: 100/min
# Per-IP limits (anonymous):
#   - LOGIN: 5/5min
#   - REGISTER: 3/hour
#   - PASSWORD_RESET: 2/hour
#   - EIDAS_LOGIN: 5/hour
#   - API_GENERAL: 30/min

# Database Connection Pooling (HikariCP)
spring.datasource.hikari.maximum-pool-size=${DB_POOL_SIZE:10}
spring.datasource.hikari.minimum-idle=${DB_MIN_IDLE:2}
spring.datasource.hikari.connection-timeout=${DB_CONNECTION_TIMEOUT:30000}
spring.datasource.hikari.idle-timeout=${DB_IDLE_TIMEOUT:600000}
spring.datasource.hikari.max-lifetime=${DB_MAX_LIFETIME:1800000}
spring.datasource.hikari.auto-commit=${DB_AUTO_COMMIT:true}
spring.datasource.hikari.leak-detection-threshold=${DB_LEAK_DETECTION:15000}

# Springdoc / Swagger UI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.disable-swagger-default-url=true
springdoc.api-docs.path=/v3/api-docs

