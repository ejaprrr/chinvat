spring.datasource.url=${DB_URL:jdbc:h2:mem:chinvat;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}

spring.h2.console.enabled=${H2_CONSOLE_ENABLED:true}

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:create-drop}
spring.jpa.show-sql=${JPA_SHOW_SQL:true}

chinvat.eidas.broker-base-url=${EIDAS_BROKER_BASE_URL:http://localhost:${SERVER_PORT:8080}}
chinvat.eidas.broker-providers-path=${EIDAS_BROKER_PROVIDERS_PATH:/api/v1/auth/eidas/mock-broker/providers}
chinvat.eidas.broker-login-path=${EIDAS_BROKER_LOGIN_PATH:/api/v1/auth/eidas/mock-broker/login}
chinvat.eidas.broker-callback-path=${EIDAS_BROKER_CALLBACK_PATH:/api/v1/auth/eidas/mock-broker/callback}
chinvat.eidas.broker-connect-timeout-millis=${EIDAS_BROKER_CONNECT_TIMEOUT_MS:3000}
chinvat.eidas.state-redis.dedicated=${EIDAS_STATE_REDIS_DEDICATED:false}
chinvat.eidas.state-redis.host=${EIDAS_STATE_REDIS_HOST:localhost}
chinvat.eidas.state-redis.port=${EIDAS_STATE_REDIS_PORT:6379}
chinvat.eidas.state-redis.database=${EIDAS_STATE_REDIS_DATABASE:1}
chinvat.eidas.state-redis.username=${EIDAS_STATE_REDIS_USERNAME:}
chinvat.eidas.state-redis.password=${EIDAS_STATE_REDIS_PASSWORD:}

