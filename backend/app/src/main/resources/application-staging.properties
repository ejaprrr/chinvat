spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/chinvat}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME:chinvat}
spring.datasource.password=${DB_PASSWORD:chinvat}

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:validate}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}

# Real eIDAS broker — point to your national connector or CEF test environment.
# Example: CEF eIDAS demo requires public redirect URI (use ngrok or staging server).
# Spain SEAD test: https://se-eidas.redsara.es/EidasNode/ServiceProvider
# CEF demo:        https://eidas.ec.europa.eu/SpecificProxyService
chinvat.eidas.broker-base-url=${EIDAS_BROKER_BASE_URL}
chinvat.eidas.broker-providers-path=${EIDAS_BROKER_PROVIDERS_PATH:/api/v1/providers}
chinvat.eidas.broker-login-path=${EIDAS_BROKER_LOGIN_PATH:/api/v1/login}
chinvat.eidas.broker-callback-path=${EIDAS_BROKER_CALLBACK_PATH:/api/v1/callback}
chinvat.eidas.broker-connect-timeout-millis=${EIDAS_BROKER_CONNECT_TIMEOUT_MS:10000}

chinvat.eidas.state-redis.dedicated=${EIDAS_STATE_REDIS_DEDICATED:true}
chinvat.eidas.state-redis.host=${EIDAS_STATE_REDIS_HOST:redis-auth}
chinvat.eidas.state-redis.port=${EIDAS_STATE_REDIS_PORT:6379}
chinvat.eidas.state-redis.database=${EIDAS_STATE_REDIS_DATABASE:1}
chinvat.eidas.state-redis.username=${EIDAS_STATE_REDIS_USERNAME:}
chinvat.eidas.state-redis.password=${EIDAS_STATE_REDIS_PASSWORD:}
