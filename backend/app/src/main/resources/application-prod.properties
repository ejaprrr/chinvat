spring.datasource.url=${DB_URL}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:validate}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}

spring.h2.console.enabled=false

# Disable Swagger UI and API docs in production
springdoc.swagger-ui.enabled=false
springdoc.api-docs.enabled=false

chinvat.eidas.broker-base-url=${EIDAS_BROKER_BASE_URL}
chinvat.eidas.broker-providers-path=${EIDAS_BROKER_PROVIDERS_PATH:/api/v1/providers}
chinvat.eidas.broker-login-path=${EIDAS_BROKER_LOGIN_PATH:/api/v1/login}
chinvat.eidas.broker-callback-path=${EIDAS_BROKER_CALLBACK_PATH:/api/v1/callback}
chinvat.eidas.broker-connect-timeout-millis=${EIDAS_BROKER_CONNECT_TIMEOUT_MS:5000}
chinvat.eidas.state-ttl=${EIDAS_STATE_TTL:PT10M}
chinvat.eidas.state-key-prefix=${EIDAS_STATE_KEY_PREFIX:chinvat:eidas:state:}
chinvat.eidas.state-redis.dedicated=${EIDAS_STATE_REDIS_DEDICATED:true}
chinvat.eidas.state-redis.host=${EIDAS_STATE_REDIS_HOST:redis-eidas}
chinvat.eidas.state-redis.port=${EIDAS_STATE_REDIS_PORT:6379}
chinvat.eidas.state-redis.database=${EIDAS_STATE_REDIS_DATABASE:0}
chinvat.eidas.state-redis.username=${EIDAS_STATE_REDIS_USERNAME:}
chinvat.eidas.state-redis.password=${EIDAS_STATE_REDIS_PASSWORD:}

