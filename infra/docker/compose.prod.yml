name: chinvat-prod

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-chinvat}
      POSTGRES_USER: ${POSTGRES_USER:-chinvat}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-chinvat} -d ${POSTGRES_DB:-chinvat}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - chinvat

  # Global Redis: permissions cache (read-only for auth service)
  # CRITICAL: In production, configure Redis with:
  #   1. requirepass [strong-password]
  #   2. bind 10.0.0.0/8 (private network only, NO 0.0.0.0)
  #   3. ACL with default-deny for all other services
  #   4. TLS enabled (--tls-port 6380, --tls-cert-file, --tls-key-file)
  # See infra/redis/SECURITY.md for full ACL setup
  redis-global:
    image: redis:7-alpine
    command: >
      redis-server
      --save ""
      --appendonly no
      --requirepass ${REDIS_GLOBAL_PASSWORD:-change-me}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_GLOBAL_PASSWORD:-change-me}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - chinvat

  # Auth Service Redis: app cache + eIDAS state (read-write for auth service only)
  # CRITICAL: In production, configure with strict ACL:
  #   1. requirepass [strong-password]
  #   2. bind 10.0.0.0/8 (private network only, NO 0.0.0.0)
  #   3. ACL user 'eidas-app' with read-write on chinvat:eidas:* and chinvat:users:*
  #   4. Block dangerous commands (FLUSHDB, SHUTDOWN, etc.)
  #   5. TLS enabled
  # See infra/redis/SECURITY.md and infra/scripts/redis-acl-setup.sh
  redis-auth:
    image: redis:7-alpine
    command: >
      redis-server
      --save ""
      --appendonly no
      --requirepass ${REDIS_AUTH_PASSWORD:-change-me}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_AUTH_PASSWORD:-change-me}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - chinvat

  # Production: runs only prisma migrate deploy – never resets the database.
  # ALLOW_DB_RESET is intentionally absent; reset.sh will refuse to run without it.
  db-migrate:
    build:
      context: ../database
      dockerfile: Dockerfile.migrate
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-chinvat}:${POSTGRES_PASSWORD:-change-me}@postgres:5432/${POSTGRES_DB:-chinvat}
    networks:
      - chinvat

  # Production: idempotent seed – skips if PROD_SEED_COMPLETED event already exists.
  db-seed:
    image: postgres:16-alpine
    depends_on:
      db-migrate:
        condition: service_completed_successfully
    command: ["sh", "/scripts/seed.sh", "/seed/001_seed.sql"]
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-chinvat}
      POSTGRES_USER: ${POSTGRES_USER:-chinvat}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    volumes:
      - ../database/scripts:/scripts:ro
      - ../database/seeds/prod:/seed:ro
    networks:
      - chinvat

  backend:
    build:
      context: ../..
      dockerfile: backend/Dockerfile
      target: prod
    image: chinvat-backend:${APP_VERSION:-latest}
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SERVER_PORT: 8080
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-chinvat}
      DB_USERNAME: ${POSTGRES_USER:-chinvat}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      # Global Redis (permissions cache) - read-only for this service
      REDIS_HOST: redis-global
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_GLOBAL_PASSWORD:-change-me}
      # Auth Service Redis (app cache + eIDAS state) - read-write for this service
      APP_CACHE_REDIS_DEDICATED: ${APP_CACHE_REDIS_DEDICATED:-true}
      APP_CACHE_REDIS_HOST: ${APP_CACHE_REDIS_HOST:-redis-auth}
      APP_CACHE_REDIS_PORT: ${APP_CACHE_REDIS_PORT:-6379}
      APP_CACHE_REDIS_DATABASE: ${APP_CACHE_REDIS_DATABASE:-0}
      APP_CACHE_REDIS_USERNAME: ${APP_CACHE_REDIS_USERNAME:-eidas-app}
      APP_CACHE_REDIS_PASSWORD: ${APP_CACHE_REDIS_PASSWORD:-${REDIS_AUTH_PASSWORD:-change-me}}
      # eIDAS State on separate DB in auth Redis
      EIDAS_STATE_REDIS_DEDICATED: ${EIDAS_STATE_REDIS_DEDICATED:-true}
      EIDAS_STATE_REDIS_HOST: ${EIDAS_STATE_REDIS_HOST:-redis-auth}
      EIDAS_STATE_REDIS_PORT: ${EIDAS_STATE_REDIS_PORT:-6379}
      EIDAS_STATE_REDIS_DATABASE: ${EIDAS_STATE_REDIS_DATABASE:-1}
      EIDAS_STATE_REDIS_USERNAME: ${EIDAS_STATE_REDIS_USERNAME:-eidas-app}
      EIDAS_STATE_REDIS_PASSWORD: ${EIDAS_STATE_REDIS_PASSWORD:-${REDIS_AUTH_PASSWORD:-change-me}}
      JPA_DDL_AUTO: validate
      JPA_SHOW_SQL: false
      APP_VERSION: ${APP_VERSION:-latest}
      APP_TIME_ZONE: ${APP_TIME_ZONE:-UTC}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://your-frontend-domain.example}
      FNMT_PROXY_SHARED_SECRET: ${FNMT_PROXY_SHARED_SECRET:-change-me-fnmt-secret}
    expose:
      - "8080"
    restart: unless-stopped
    depends_on:
      db-seed:
        condition: service_completed_successfully
      redis-global:
        condition: service_healthy
      redis-auth:
        condition: service_healthy
    networks:
      - chinvat

  nginx:
    build:
      context: ../..
      dockerfile: infra/docker/nginx/Dockerfile
    environment:
      UPSTREAM_HOST: backend
      UPSTREAM_PORT: 8080
      HTTPS_REDIRECT_PORT: ${NGINX_HTTPS_PORT:-443}
      MTLS_VERIFY_MODE: optional
      MTLS_PROXY_SHARED_SECRET: ${FNMT_PROXY_SHARED_SECRET:-change-me-fnmt-secret}
      TLS_CERT_PATH: /etc/nginx/tls/server.crt
      TLS_KEY_PATH: /etc/nginx/tls/server.key
      MTLS_CA_PATH: /etc/nginx/mtls/ca.crt
    ports:
      - "${NGINX_HTTP_PORT:-80}:8080"
      - "${NGINX_HTTPS_PORT:-443}:8443"
    volumes:
      - ./nginx/certs/prod/tls:/etc/nginx/tls
      - ./nginx/certs/prod/mtls:/etc/nginx/mtls
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - chinvat

networks:
  chinvat:
    driver: bridge

volumes:
  postgres_prod_data:
