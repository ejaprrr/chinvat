name: chinvat-prod

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-chinvat}
      POSTGRES_USER: ${POSTGRES_USER:-chinvat}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-chinvat} -d ${POSTGRES_DB:-chinvat}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - chinvat

  # Production: runs only prisma migrate deploy – never resets the database.
  # ALLOW_DB_RESET is intentionally absent; reset.sh will refuse to run without it.
  db-migrate:
    build:
      context: ../database
      dockerfile: Dockerfile.migrate
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-chinvat}:${POSTGRES_PASSWORD:-change-me}@postgres:5432/${POSTGRES_DB:-chinvat}
    networks:
      - chinvat

  # Production: idempotent seed – skips if PROD_SEED_COMPLETED event already exists.
  db-seed:
    image: postgres:16-alpine
    depends_on:
      db-migrate:
        condition: service_completed_successfully
    command: ["sh", "/scripts/seed.sh", "/seed/001_seed.sql"]
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-chinvat}
      POSTGRES_USER: ${POSTGRES_USER:-chinvat}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    volumes:
      - ../database/scripts:/scripts:ro
      - ../database/seeds/prod:/seed:ro
    networks:
      - chinvat

  backend:
    build:
      context: ../..
      dockerfile: backend/Dockerfile
      target: prod
    image: chinvat-backend:${APP_VERSION:-latest}
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SERVER_PORT: 8080
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-chinvat}
      DB_USERNAME: ${POSTGRES_USER:-chinvat}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      JPA_DDL_AUTO: validate
      JPA_SHOW_SQL: false
      APP_VERSION: ${APP_VERSION:-latest}
      APP_TIME_ZONE: ${APP_TIME_ZONE:-UTC}
    expose:
      - "8080"
    restart: unless-stopped
    depends_on:
      db-seed:
        condition: service_completed_successfully
    networks:
      - chinvat

  nginx:
    build:
      context: ../..
      dockerfile: infra/docker/nginx/Dockerfile
    environment:
      UPSTREAM_HOST: backend
      UPSTREAM_PORT: 8080
      HTTPS_REDIRECT_PORT: ${NGINX_HTTPS_PORT:-443}
      MTLS_VERIFY_MODE: optional
      TLS_CERT_PATH: /etc/nginx/tls/server.crt
      TLS_KEY_PATH: /etc/nginx/tls/server.key
      MTLS_CA_PATH: /etc/nginx/mtls/ca.crt
    ports:
      - "${NGINX_HTTP_PORT:-80}:8080"
      - "${NGINX_HTTPS_PORT:-443}:8443"
    volumes:
      - ./nginx/certs/prod/tls:/etc/nginx/tls
      - ./nginx/certs/prod/mtls:/etc/nginx/mtls
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - chinvat

networks:
  chinvat:
    driver: bridge

volumes:
  postgres_prod_data:
