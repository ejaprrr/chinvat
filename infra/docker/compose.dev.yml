name: chinvat-dev

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-chinvat}
      POSTGRES_USER: ${POSTGRES_USER:-chinvat}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-chinvat}
    ports:
      - "${POSTGRES_EXPOSED_PORT:-5432}:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-chinvat} -d ${POSTGRES_DB:-chinvat}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - chinvat

  # Global Redis: permissions cache, org data
  # In production: bind on private network, require password, use ACL with default-deny
  redis-global:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "${REDIS_GLOBAL_EXPOSED_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - chinvat

  # Auth Service Redis: eIDAS state + app cache
  # In production: bind on private network, require password, use strict ACL
  redis-auth:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "${REDIS_AUTH_EXPOSED_PORT:-6380}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - chinvat

  # DEV ONLY: drops and recreates the public schema before migrations run.
  # Controlled by ALLOW_DB_RESET=true – never set this in production.
  db-reset:
    image: postgres:16-alpine
    depends_on:
      postgres:
        condition: service_healthy
    command: ["sh", "/scripts/reset.sh"]
    environment:
      ALLOW_DB_RESET: ${ALLOW_DB_RESET:-true}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-chinvat}
      POSTGRES_USER: ${POSTGRES_USER:-chinvat}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-chinvat}
    volumes:
      - ../database/scripts:/scripts:ro
    networks:
      - chinvat

  db-migrate:
    build:
      context: ../database
      dockerfile: Dockerfile.migrate
    depends_on:
      db-reset:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-chinvat}:${POSTGRES_PASSWORD:-chinvat}@postgres:5432/${POSTGRES_DB:-chinvat}
    networks:
      - chinvat

  db-seed:
    image: postgres:16-alpine
    depends_on:
      db-migrate:
        condition: service_completed_successfully
    command: ["sh", "/scripts/seed.sh", "/seed/001_seed.sql"]
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-chinvat}
      POSTGRES_USER: ${POSTGRES_USER:-chinvat}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-chinvat}
    volumes:
      - ../database/scripts:/scripts:ro
      - ../database/seeds/dev:/seed:ro
    networks:
      - chinvat

  backend:
    build:
      context: ../..
      dockerfile: backend/Dockerfile
      target: dev
    develop:
      watch:
        - path: ../../backend
          action: rebuild
          ignore:
            - ../../backend/**/target/
            - ../../backend/.mvn/
            - ../../backend/.idea/
            - ../../backend/.vscode/
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SERVER_PORT: 8080
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-chinvat}
      DB_USERNAME: ${POSTGRES_USER:-chinvat}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-chinvat}
      # Global Redis (permissions cache) - read-only for this service
      REDIS_HOST: redis-global
      REDIS_PORT: 6379
      # Auth Service Redis (app cache + eIDAS state) - read-write for this service
      APP_CACHE_REDIS_DEDICATED: ${APP_CACHE_REDIS_DEDICATED:-false}
      APP_CACHE_REDIS_HOST: ${APP_CACHE_REDIS_HOST:-redis-auth}
      APP_CACHE_REDIS_PORT: ${APP_CACHE_REDIS_PORT:-6379}
      APP_CACHE_REDIS_DATABASE: ${APP_CACHE_REDIS_DATABASE:-0}
      APP_CACHE_REDIS_USERNAME: ${APP_CACHE_REDIS_USERNAME:-}
      APP_CACHE_REDIS_PASSWORD: ${APP_CACHE_REDIS_PASSWORD:-}
      # eIDAS State on separate DB in auth Redis
      EIDAS_STATE_REDIS_DEDICATED: ${EIDAS_STATE_REDIS_DEDICATED:-false}
      EIDAS_STATE_REDIS_HOST: ${EIDAS_STATE_REDIS_HOST:-redis-auth}
      EIDAS_STATE_REDIS_PORT: ${EIDAS_STATE_REDIS_PORT:-6379}
      EIDAS_STATE_REDIS_DATABASE: ${EIDAS_STATE_REDIS_DATABASE:-1}
      EIDAS_STATE_REDIS_USERNAME: ${EIDAS_STATE_REDIS_USERNAME:-}
      EIDAS_STATE_REDIS_PASSWORD: ${EIDAS_STATE_REDIS_PASSWORD:-}
      JPA_DDL_AUTO: validate
      JPA_SHOW_SQL: true
      APP_VERSION: ${APP_VERSION:-0.0.1-SNAPSHOT}
      APP_TIME_ZONE: ${APP_TIME_ZONE:-UTC}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      FNMT_PROXY_SHARED_SECRET: ${FNMT_PROXY_SHARED_SECRET:-dev-fnmt-proxy-secret}
    expose:
      - "8080"
    ports:
      - "${APP_DEBUG_PORT:-5005}:5005"
    depends_on:
      db-seed:
        condition: service_completed_successfully
      redis-global:
        condition: service_healthy
      redis-auth:
        condition: service_healthy
    networks:
      - chinvat

  nginx:
    build:
      context: ../..
      dockerfile: infra/docker/nginx/Dockerfile
    environment:
      UPSTREAM_HOST: backend
      UPSTREAM_PORT: 8080
      HTTPS_REDIRECT_PORT: ${NGINX_HTTPS_PORT:-8443}
      MTLS_VERIFY_MODE: optional
      MTLS_PROXY_SHARED_SECRET: ${FNMT_PROXY_SHARED_SECRET:-dev-fnmt-proxy-secret}
      TLS_CERT_PATH: /etc/nginx/tls/server.crt
      TLS_KEY_PATH: /etc/nginx/tls/server.key
      MTLS_CA_PATH: /etc/nginx/mtls/ca.crt
    ports:
      - "${NGINX_HTTP_PORT:-8080}:8080"
      - "${NGINX_HTTPS_PORT:-8443}:8443"
    volumes:
      - ./nginx/certs/dev/tls:/etc/nginx/tls
      - ./nginx/certs/dev/mtls:/etc/nginx/mtls
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - chinvat

networks:
  chinvat:
    driver: bridge

volumes:
  postgres_dev_data:

