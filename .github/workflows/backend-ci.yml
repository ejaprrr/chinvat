name: Backend CI

on:
  push:
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'

permissions:
  contents: read

concurrency:
  group: backend-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Spotless and tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: /Users/jiriposavad/Documents/FullStack/chinvat-malaga-2026/backend

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
          cache-dependency-path: |
            backend/pom.xml
            backend/app/pom.xml
            backend/common/pom.xml

      - name: Grant execute permission to Maven wrapper
        run: chmod +x mvnw

      - name: Verify formatting
        run: ./mvnw spotless:check

      - name: Run tests
        run: ./mvnw test

