name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [develop]

jobs:
  # ── Backend: format check + tests ──────────────────────────────────────────
  backend:
    name: Backend – build & test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Check formatting (Spotless)
        run: make backend-fmt-check

      - name: Build & test
        run: make backend-test

  # ── Database: validate Prisma schema parses ────────────────────────────────
  db-schema:
    name: DB – validate Prisma schema
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: infra/database/prisma/package.json

      - name: Install Prisma
        working-directory: infra/database/prisma
        run: npm install

      - name: Validate schema
        working-directory: infra/database/prisma
        run: npx prisma validate --schema=schema.prisma

  # ── Docker: build image (no push on PR) ────────────────────────────────────
  docker-build:
    name: Docker – build image
    runs-on: ubuntu-latest
    needs: [backend, db-schema]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build prod image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: backend/Dockerfile
          target: prod
          push: false
          tags: chinvat-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max


