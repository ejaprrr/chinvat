server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Serve static assets with long caching
    location ~* ^/assets/ {
        expires 365d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Dynamic config endpoint - always revalidate
    location /config.js {
        expires -1;
        add_header Cache-Control "must-revalidate, no-cache, no-store, max-age=0";
        try_files $uri =404;
    }

    # Health check endpoint
    location /health.html {
        try_files $uri =404;
    }

    # SPA routing - all other routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Deny access to hidden files and directories
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
