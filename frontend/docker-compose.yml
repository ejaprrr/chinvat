version: "3.9"

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      # Point nginx at your backend - required!
      BACKEND_UPSTREAM_URL: ${BACKEND_UPSTREAM_URL:-http://localhost:8080}
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://localhost:80/health",
        ]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - frontend-network

networks:
  frontend-network:
    driver: bridge
